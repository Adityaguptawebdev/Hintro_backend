<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#0d0d0d"/>
  <text x="450" y="34" text-anchor="middle" fill="#f5f5f5" font-size="20" font-weight="700">Hintro Backend — Layered Architecture</text>

  <!-- Client -->
  <rect x="330" y="56" width="240" height="46" rx="10" fill="#1c1c1e" stroke="#f97316" stroke-width="1.5"/>
  <text x="450" y="84" text-anchor="middle" fill="#f5f5f5" font-size="14" font-weight="600">React SPA (Vite) — Client</text>

  <line x1="450" y1="102" x2="450" y2="128" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Express + middleware -->
  <rect x="230" y="130" width="440" height="64" rx="10" fill="#1c1c1e" stroke="#3f3f46"/>
  <text x="450" y="152" text-anchor="middle" fill="#f5f5f5" font-size="13" font-weight="700">Express App</text>
  <text x="450" y="172" text-anchor="middle" fill="#9f9fa9" font-size="11">helmet · cors · rate-limit · trace-id · morgan · xss-clean</text>

  <line x1="450" y1="194" x2="450" y2="218" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layered pipeline -->
  <g font-size="13" fill="#f5f5f5" font-weight="600">
    <rect x="40" y="220" width="180" height="52" rx="10" fill="#1c1c1e" stroke="#f97316" stroke-width="1.5"/>
    <text x="130" y="251" text-anchor="middle">Routes</text>

    <rect x="250" y="220" width="180" height="52" rx="10" fill="#1c1c1e" stroke="#f97316" stroke-width="1.5"/>
    <text x="340" y="251" text-anchor="middle">Controllers</text>

    <rect x="460" y="220" width="180" height="52" rx="10" fill="#1c1c1e" stroke="#f97316" stroke-width="1.5"/>
    <text x="550" y="251" text-anchor="middle">Services</text>

    <rect x="670" y="220" width="190" height="52" rx="10" fill="#1c1c1e" stroke="#f97316" stroke-width="1.5"/>
    <text x="765" y="251" text-anchor="middle">Repositories</text>
  </g>
  <text x="130" y="286" text-anchor="middle" fill="#9f9fa9" font-size="10.5">HTTP → validators</text>
  <text x="340" y="286" text-anchor="middle" fill="#9f9fa9" font-size="10.5">req/res + asyncHandler</text>
  <text x="550" y="286" text-anchor="middle" fill="#9f9fa9" font-size="10.5">business logic</text>
  <text x="765" y="286" text-anchor="middle" fill="#9f9fa9" font-size="10.5">Mongoose queries</text>

  <line x1="220" y1="246" x2="250" y2="246" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="246" x2="460" y2="246" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="246" x2="670" y2="246" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="765" y1="272" x2="765" y2="330" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MongoDB -->
  <rect x="655" y="332" width="220" height="50" rx="10" fill="#1c1c1e" stroke="#00bc7d" stroke-width="1.5"/>
  <text x="765" y="362" text-anchor="middle" fill="#f5f5f5" font-size="13" font-weight="600">MongoDB Atlas</text>

  <!-- node-cron jobs -->
  <line x1="550" y1="272" x2="550" y2="330" stroke="#9f9fa9" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="440" y="332" width="220" height="50" rx="10" fill="#1c1c1e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="550" y="352" text-anchor="middle" fill="#f5f5f5" font-size="12" font-weight="600">node-cron Jobs</text>
  <text x="550" y="369" text-anchor="middle" fill="#9f9fa9" font-size="10">reminders · overdue detection (15 min)</text>

  <!-- External integrations -->
  <text x="450" y="418" text-anchor="middle" fill="#9f9fa9" font-size="12" font-weight="700" letter-spacing="1">EXTERNAL INTEGRATIONS</text>

  <g font-size="11.5" fill="#f5f5f5" font-weight="600">
    <rect x="30" y="434" width="150" height="46" rx="9" fill="#1c1c1e" stroke="#3b82f6"/>
    <text x="105" y="461" text-anchor="middle">Auth0 (Google)</text>

    <rect x="196" y="434" width="150" height="46" rx="9" fill="#1c1c1e" stroke="#f59e0b"/>
    <text x="271" y="461" text-anchor="middle">Gemini AI</text>

    <rect x="362" y="434" width="150" height="46" rx="9" fill="#1c1c1e" stroke="#22d3ee"/>
    <text x="437" y="461" text-anchor="middle">ZegoCloud</text>

    <rect x="528" y="434" width="150" height="46" rx="9" fill="#1c1c1e" stroke="#ec4899"/>
    <text x="603" y="461" text-anchor="middle">Telegram / Slack</text>

    <rect x="694" y="434" width="176" height="46" rx="9" fill="#1c1c1e" stroke="#84cc16"/>
    <text x="782" y="461" text-anchor="middle">Gmail SMTP</text>
  </g>

  <line x1="230" y1="194" x2="105" y2="434" stroke="#3f3f46" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="450" y1="194" x2="271" y2="434" stroke="#3f3f46" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="550" y1="272" x2="437" y2="434" stroke="#3f3f46" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="550" y1="272" x2="603" y2="434" stroke="#3f3f46" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="670" y1="194" x2="782" y2="434" stroke="#3f3f46" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Footer note -->
  <rect x="130" y="510" width="640" height="80" rx="10" fill="#1c1008" stroke="#f97316" stroke-width="1"/>
  <text x="450" y="536" text-anchor="middle" fill="#f97316" font-size="12" font-weight="700">JWT-based stateless auth</text>
  <text x="450" y="558" text-anchor="middle" fill="#9f9fa9" font-size="11">Access + refresh token pair issued on register/login and on Auth0 (Google)</text>
  <text x="450" y="576" text-anchor="middle" fill="#9f9fa9" font-size="11">callback — same JWT contract either way, verified by auth.middleware.js</text>
</svg>
